data:
  batch_size: 128
  coco_root: /content/coco
  image_root: dataset/coco
  max_captions_per_image: 5
  mode: coco
  num_workers: 4
  train_augment: true
  train_captions_json: annotations/captions_train2017.json
  train_jsonl: train.jsonl
  train_split: train2017
  val_captions_json: annotations/captions_val2017.json
  val_jsonl: val.jsonl
  val_split: val2017
device: cuda
distill:
  affinity_columns: false
  affinity_temp: 0.1
  distill_margin_thr: 0.2
  teacher_model_name: ViT-B-32
  teacher_pretrained: openai
  use_teacher: true
export:
  onnx_path: model.onnx
  opset: 18
loss:
  label_smoothing: 0.0
  rank_k: 3
  rank_margin: 0.1
  w_contrastive: 1.0
  w_distill_affinity: 0.8
  w_rank: 0.1
model:
  clip_mean:
  - 0.48145466
  - 0.4578275
  - 0.40821073
  clip_std:
  - 0.26862954
  - 0.26130258
  - 0.27577711
  dropout: 0.0
  embed_dim: 256
  logit_scale_max: 4.6
  logit_scale_min: -4.6
  normalize_input: true
  temperature_init: 0.07
  text_heads: 4
  text_layers: 4
  text_mlp_ratio: 4.0
  text_width: 256
  vision_backbone: fastvit_s12.apple_in1k
  vision_pretrained: true
output:
  out_dir: runs/lpcvc_clip_lite
seed: 42
train:
  amp: true
  epochs: 30
  eval_every_epochs: 1
  grad_clip: 1.0
  log_every: 20
  lr: 5.0e-4
  warmup_epochs: 3.0
  weight_decay: 0.05
