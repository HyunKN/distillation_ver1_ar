seed: 42
device: cuda   # cpu|cuda|auto

data:
  mode: coco            # coco|jsonl
  coco_root: dataset/coco
  train_split: train2017
  val_split: val2017
  train_captions_json: annotations/captions_train2017.json
  val_captions_json: annotations/captions_val2017.json

  # used when mode=jsonl
  image_root: dataset/coco
  train_jsonl: train.jsonl
  val_jsonl: val.jsonl

  max_captions_per_image: 5
  num_workers: 4
  batch_size: 64
  train_augment: true   # [NEW] Enable training augmentation (RandomResizedCrop, HFlip, ColorJitter)

model:
  vision_backbone: fastvit_s12.apple_in1k
  vision_pretrained: true
  normalize_input: true
  clip_mean: [0.48145466, 0.4578275, 0.40821073]
  clip_std:  [0.26862954, 0.26130258, 0.27577711]

  embed_dim: 256

  text_width: 256
  text_layers: 4
  text_heads: 4
  text_mlp_ratio: 4.0
  dropout: 0.0
  temperature_init: 0.07
  
  # [NEW] Logit scale clamping range (log scale)
  logit_scale_min: -4.6   # log(1/100)
  logit_scale_max: 4.6    # log(100)

train:
  epochs: 3
  lr: 2.0e-4
  weight_decay: 0.02
  warmup_epochs: 1.0      # [NEW] Linear warmup for this many epochs
  grad_clip: 1.0          # [NEW] Gradient clipping max norm (0 to disable)
  amp: true
  log_every: 20
  eval_every_epochs: 1

distill:
  use_teacher: true
  teacher_model_name: ViT-B-32
  teacher_pretrained: openai

  # Selective distillation: 학생이 자신 없을 때만 teacher 사용
  distill_margin_thr: 0.2

  # Affinity mimicking temperature
  affinity_temp: 0.1

  # 추가로 columns(text->image)도 맞출지 (비용↑)
  affinity_columns: false

loss:
  w_contrastive: 1.0
  w_rank: 0.1
  rank_k: 3
  rank_margin: 0.1
  w_distill_affinity: 0.5  
  label_smoothing: 0.1     # [NEW] Label smoothing factor (0.0-0.2 recommended)

output:
  out_dir: runs/lpcvc_clip_lite

export:
  opset: 18  # 대회 샘플과 동일
  onnx_path: model.onnx
