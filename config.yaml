data:
  batch_size: 128
  coco_root: dataset/coco
  image_root: dataset
  max_captions_per_image: 5
  mode: jsonl
  num_workers: 4
  tokenizer_type: open_clip
  train_augment: true
  train_captions_json: annotations/captions_train2017.json
  train_jsonl: dataset/prepared_jsonl/train.jsonl
  train_split: train2017
  val_captions_json: annotations/captions_val2017.json
  val_jsonl: dataset/prepared_jsonl/val.jsonl
  val_split: val2017
device: cuda
distill:
  use_teacher: true
  
  # Dual Teacher Setup for A100 (SigLIP 2 Giant + PE-Core-bigG-14-448)
  # teacher 정의와 teacher mixing 정책을 분리합니다.
  # 아래 teachers 블록은 "무슨 teacher를 쓸지"만 정의합니다.
  # teacher_weight_mode=static 일 때의 mixing 비율은 static_teacher_weights 에서만 읽습니다.
  # source-aware routing을 쓰려면 teacher_weight_mode=adaptive_source 로 바꾸고
  # source_teacher_weights 에 데이터셋별 prior를 지정하세요.
  teachers:
    # Teacher 1: Google SigLIP 2 Giant (Efficiency & Alignment)
    # Model name 'ViT-gopt-16-SigLIP2-256' requires open_clip >= 2.29
    - name: ViT-gopt-16-SigLIP2-256
      pretrained: webli
      input_size: 256
      
    # Teacher 2: Meta FAIR PE-Core bigG/14 (strong retrieval & perception prior)
    - name: PE-Core-bigG-14-448
      pretrained: meta
      input_size: 448

  static_teacher_weights: [0.5, 0.5]  # teacher_weight_mode=static 일 때만 사용
      
  # Distillation strategy settings
  distill_margin_thr: 0.2          # selective distill threshold
  affinity_temp: 0.1               # fallback (legacy)
  affinity_temp_start: 0.12        # epoch 1 temperature (softer targets)
  affinity_temp_end: 0.07          # final epoch temperature (sharper targets)
  affinity_temp_schedule: cosine   # constant | linear | cosine
  adaptive_teacher_weight: true    # true면 teacher_weight_mode=static 이어도 adaptive/adaptive_source 로 자동 승격
  adaptive_teacher_tau: 0.07       # softmax temperature for adaptive weighting
  adaptive_teacher_w_min: 0.20     # teacher collapse 방지 최소 가중치(2명 기준 0.0~0.49)
  teacher_weight_mode: adaptive    # static | adaptive | adaptive_source
  source_teacher_weights: {}       # adaptive_source 전용. 비어 있거나 source key가 없으면 uniform prior 사용
  affinity_columns: false
  offline_feature_dir: null
export:
  onnx_path: model.onnx
  opset: 18
loss:
  label_smoothing: 0.0
  rank_k: 3
  rank_margin: 0.1
  w_contrastive: 1.0
  w_distill_affinity: 0.8
  w_rank: 0.1
  # [NEW] Paper-based losses (BLIP, FG-CLIP, TULIP)
  w_hard_negative: 0.1      # Hard Negative Mining Loss weight
  w_text_text: 0.05         # Text-Text Contrastive Loss weight
  hard_negative_k: 5        # Number of hard negatives to select
model:
  image_model_name: mobilenetv4_hybrid_large.e600_r384_in1k
  image_pretrained: true
  image_input_size: 384
  freeze_image_backbone: false
  text_model_name: hf-hub:DatologyAI/retr-opt-vit-b-32
  freeze_text_backbone: false
  embed_dim: 256
  temperature_init: 0.07
  logit_scale_min: -4.6
  logit_scale_max: 4.6
output:
  out_dir: runs/lpcvc_clip_lite
seed: 42
train:
  amp: true
  epochs: 10
  eval_every_epochs: 1
  grad_clip: 1.0
  log_every: 20
  lr: 5.0e-4
  warmup_epochs: 3.0
  weight_decay: 0.05
  # WandB 실험 추적 (선택적)
  use_wandb: false
  wandb_project: lpcvc-clip-lite
  wandb_run_name: null  # null이면 자동 생성
  # torch.compile 학습 가속 (PyTorch 2.x)
  use_compile: true   # A100에서 10-30% 학습 가속
  # EMA (Exponential Moving Average)
  use_ema: true
  ema_decay: 0.999
